server:
    port: 8002
    #注意空格

spring:
    application:
        name: live-start-admin
    data:
        redis:
            host: 127.0.0.1
            port: 6379
            password: 123456
        cloud:
            nacos:
                discovery:
                    server-addr: 127.0.0.1:8848

mybatis-plus:
    configuration:
        map-underscore-to-camel-case: false
        #关闭驼峰转下划线

# Livestart 用户流量风控配置
livestart:
    flow-limit:
        # 是否开启用户请求流量风控 (true=开启)
        enable: false
        # 时间窗口内最大访问次数
        max-access-count: 10
        # 时间窗口大小，单位：秒
        time-window: "1"
    visitor:
        # 观演人证件号 AES 加密密钥（必须 16 位）
        # 生产环境务必通过环境变量或配置中心注入，版本库中仅暴露本地测试用的默认值
        aes-key: ${VISITOR_AES_KEY:DevKey1234567890}