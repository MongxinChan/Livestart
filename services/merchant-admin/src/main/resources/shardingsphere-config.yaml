# Livestart 商户端分库分表核心配置文件 (ShardingSphere-JDBC 规范)
# 提供商户端专用的分数据源和广播同步规则

# =========================================================================
# 1. 物理数据源集合（需要与 livestart_all_sharding.sql 中的 7 个分库保持一致）
# =========================================================================
dataSources:
  # 公共与元数据中心
  ds_common:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/live_start?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: &db_user root
    password: &db_pass 123456
  
  # 用户物理库
  ds_user_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_user_0?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass
  ds_user_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_user_1?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass

  # 订单物理库
  ds_order_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_order_0?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass
  ds_order_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_order_1?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass

  # 座位物理库
  ds_seat_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_seat_0?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass
  ds_seat_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_seat_1?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: *db_user
    password: *db_pass

# =========================================================================
# 2. 商户后台路由及双写复制规则
# =========================================================================
rules:
  - !SHARDING
    tables:
      t_placeholder:
        actualDataNodes: ds_common.t_placeholder
      
    # 广播表声明
    broadcastTables:
      - t_event
      - t_event_config
      - t_ticket_sku
      - t_refund_policy

  - !SINGLE
    defaultDataSource: ds_common

# =========================================================================
# 3. 全局基础属性配置
# =========================================================================
props:
  sql-show: true
