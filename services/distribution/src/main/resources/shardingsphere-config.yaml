######################################
# ShardingSphere 分片配置 (Distribution 服务)
#   - t_user_ticket_{0..15} 按 user_id hash 分 16 表，存储在 ds_order 库
#   - t_order_{0..15}       只读，按 user_id hash 分 16 表，存储在 ds_order 库
#   - 其他表均无分片，直接存储在公共库 ds_common (live_start)
######################################

mode:
  type: Standalone

dataSources:
  ds_order_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_order_0?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: &db_user root
    password: &db_pass 123456
  ds_order_1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/ds_order_1?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: *db_user
    password: *db_pass
  ds_common:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/live_start?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: *db_user
    password: *db_pass

rules:
  - !SHARDING
    tables:
      t_user_ticket:
        actualDataNodes: ds_order_${0..1}.t_user_ticket_${0..15}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: order_database_inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: user_ticket_table_hash_mod
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflake
      t_order:
        actualDataNodes: ds_order_${0..1}.t_order_${0..15}
        databaseStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: order_database_inline
        tableStrategy:
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: user_ticket_table_hash_mod

    shardingAlgorithms:
      order_database_inline:
        type: INLINE
        props:
          algorithm-expression: ds_order_${user_id % 2}
      user_ticket_table_hash_mod:
        type: CLASS_BASED
        props:
          strategy: standard
          algorithmClassName: com.mongxin.livestart.distribution.dao.sharding.UserTicketTableHashModShardingAlgorithm
    keyGenerators:
      snowflake:
        type: SNOWFLAKE

  - !SINGLE
    defaultDataSource: ds_common

props:
  sql-show: true
